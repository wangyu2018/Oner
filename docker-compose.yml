version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - PORT=${PORT:-3000}
      - DB_PATH=${DB_PATH:-/data/oner.db}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required for production deployment}
      - PASSWORD_VAULT_KEY=${PASSWORD_VAULT_KEY:-}
      - NODE_ENV=${NODE_ENV:-production}
      - WX_APPID=${WX_APPID:-}
      - WX_APPSECRET=${WX_APPSECRET:-}
    volumes:
      - oner-data:/data
      - oner-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  oner-data:
  oner-uploads:
