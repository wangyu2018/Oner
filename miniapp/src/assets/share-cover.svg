<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="400" fill="url(#bg)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="420" cy="340" r="60" fill="rgba(255,255,255,0.06)"/>
  <circle cx="380" cy="80" r="25" fill="rgba(255,255,255,0.1)"/>
  <!-- Glass card -->
  <rect x="60" y="80" width="380" height="240" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Icon row -->
  <text x="110" y="150" font-size="28" fill="rgba(255,255,255,0.9)" font-family="system-ui">📝</text>
  <text x="170" y="150" font-size="28" fill="rgba(255,255,255,0.9)" font-family="system-ui">🤖</text>
  <text x="230" y="150" font-size="28" fill="rgba(255,255,255,0.9)" font-family="system-ui">📋</text>
  <text x="290" y="150" font-size="28" fill="rgba(255,255,255,0.9)" font-family="system-ui">🔐</text>
  <text x="350" y="150" font-size="28" fill="rgba(255,255,255,0.9)" font-family="system-ui">📌</text>
  <!-- Title -->
  <text x="250" y="210" text-anchor="middle" font-size="42" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">Oner</text>
  <!-- Subtitle -->
  <text x="250" y="250" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.85)" font-family="system-ui, -apple-system, sans-serif">你的效率工作台</text>
  <!-- Tag line -->
  <text x="250" y="285" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.6)" font-family="system-ui, -apple-system, sans-serif">笔记 · AI · 看板 · 密码库 · 备忘</text>
</svg>
